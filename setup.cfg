[flake8]
max-line-length = 120
exclude = migrations,__pycache__,.git,staticfiles,frontend,templates,static
ignore = E501,W503,E231

[isort]
profile = black
multi_line_output = 3
line_length = 120
skip = migrations

[mypy]
python_version = 3.12
ignore_missing_imports = True

[tool:pytest]
DJANGO_SETTINGS_MODULE = src.presentation.config.settings
