name: CI — Whispr

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DJANGO_SETTINGS_MODULE: src.presentation.config.settings
  DJANGO_SECRET_KEY: ci-secret-key
  JWT_SECRET: ci-jwt-secret
  DEBUG: "True"
  POSTGRES_HOST: localhost
  POSTGRES_DB: whispr_ci
  POSTGRES_USER: whispr
  POSTGRES_PASSWORD: whispr_pass
  REDIS_URL: redis://localhost:6379/0

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: pip install flake8 black isort
      - run: black  src/ tests/ --line-length 120
      - run: isort src/ tests/ --profile black
      - run: flake8 src/ tests/ --max-line-length=120 --exclude=migrations,__pycache__ --ignore=E501,W503,E704,E203,E402

  # ── Unit Tests ────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: pip install -r requirements.txt
      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            --cov=src/domain \
            --cov=src/application \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml \
            -v
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  # ── Integration Tests ─────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: {POSTGRES_DB: whispr_ci, POSTGRES_USER: whispr, POSTGRES_PASSWORD: whispr_pass}
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 10
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: pip install -r requirements.txt
      - run: python manage.py migrate --noinput
      - run: pytest tests/ --cov=src --cov-report=xml:coverage-full.xml -v
      - uses: actions/upload-artifact@v4
        with: {name: coverage-full, path: coverage-full.xml}

  # ── SonarQube ─────────────────────────────────────────────────────────────────
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [unit-tests]
    # Запускається тільки на main/develop і якщо є SONAR_TOKEN
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with: {name: coverage-xml}
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ── Docker Build ──────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t whispr:${{ github.sha }} .
      - run: docker compose config
