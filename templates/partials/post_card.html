<article class="post-card" data-id="{{ post.id }}">
  <div class="post-head">
    <a href="/user/{{ post.author_username }}" class="p-avatar">
      {{ post.author_username|first|upper }}
    </a>
    <div class="p-meta">
      <a href="/user/{{ post.author_username }}" class="p-author">
        @{{ post.author_username }}
        {% if post.author_username == current_user.username %}
          <span class="own-tag">Мій</span>
        {% endif %}
      </a>
      <div class="p-time">{{ post.created_at }}</div>
    </div>
  </div>

  <div class="p-body">{{ post.content }}</div>

  <div class="p-actions">
    <button class="act-btn like-btn {% if post.is_liked_by_me %}liked{% endif %}"
            data-id="{{ post.id }}"
            data-liked="{{ post.is_liked_by_me|yesno:'true,false' }}">
      <svg viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
      <span class="like-count">{{ post.like_count }}</span>
    </button>

    <button class="act-btn" onclick="openCompose('@{{ post.author_username }} ')">
      <svg viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
      Відповісти
    </button>

    {% if post.author_username == current_user.username %}
    <button class="act-btn del-btn" data-id="{{ post.id }}">
      <svg viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
      Видалити
    </button>
    {% endif %}
  </div>
</article>
